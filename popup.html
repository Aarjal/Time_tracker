<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="header-content">
          <div class="title-section">
            <h3 class="title">📊 Site Time Tracker</h3>
            <p class="subtitle">Track your browsing patterns</p>
          </div>
          <div class="total-badge" id="totalBadge">0h 0m</div>
        </div>
      </div>

      <div class="list-wrapper">
        <div id="list"></div>
      </div>

      <div class="footer">
        <button id="clear" class="btn-clear">🗑️ Clear All Data</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
