<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="card">
    <div class="header">
      <h3 class="title">Site Time Tracker</h3>
      <p class="subtitle">Your most visited sites in this browser</p>
      <div class="summary">Total tracked: <strong id="total">0m 0s</strong></div>
    </div>

    <div id="list"></div>

    <div class="footer">
      <button id="clear">Clear Data</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
